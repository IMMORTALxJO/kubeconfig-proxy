name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Race test proxy package
        run: go test -race ./internal/proxy

      - name: Build
        run: go build -trimpath -o /tmp/kubeconfig-proxy ./cmd/kubeconfig-proxy
