name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Vulnerability scan
        env:
          GOTOOLCHAIN: go1.26.5
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

      - name: Race test proxy package
        run: go test -race ./internal/proxy

      - name: Build
        run: go build -trimpath -o /tmp/kubeconfig-proxy ./cmd/kubeconfig-proxy
