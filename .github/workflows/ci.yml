name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Staticcheck
        run: make staticcheck

      - name: Security scan
        run: make gosec

      - name: Test
        run: make test

      - name: Vulnerability scan
        run: make vuln

      - name: Race test proxy package
        run: make race

      - name: Build
        run: make build BUILD_DIR=/tmp
