name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="kubeconfig-proxy_${VERSION}_${goos}_${goarch}"
            binary="kubeconfig-proxy"

            if [ "$goos" = "windows" ]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w" -o "dist/${name}/${binary}" ./cmd/kubeconfig-proxy

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q -r "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi

            rm -rf "dist/${name}"
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" dist/* \
            --title "$TAG_NAME" \
            --generate-notes
