name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Vulnerability scan
        env:
          GOTOOLCHAIN: go1.26.5
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

      - name: Test
        run: go test ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="kubeconfig-proxy_${VERSION}_${goos}_${goarch}"
            binary="kubeconfig-proxy"

            if [ "$goos" = "windows" ]; then
              binary="${binary}.exe"
            fi

            mkdir -p "dist/${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags="-s -w" -o "dist/${name}/${binary}" ./cmd/kubeconfig-proxy

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q -r "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi

            rm -rf "dist/${name}"
          done

          (cd dist && sha256sum * > checksums.txt)

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.1.0

      - name: Sign release assets
        run: |
          set -euo pipefail

          for artifact in dist/*.tar.gz dist/*.zip dist/checksums.txt; do
            cosign sign-blob --yes --bundle "${artifact}.bundle" "$artifact"
          done

      - name: Generate build provenance
        uses: actions/attest-build-provenance@e4d4f7c39adfa4c260fb5c147f0622000aa14b99 # v4.0.0
        with:
          subject-checksums: dist/checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" dist/* \
            --title "$TAG_NAME" \
            --generate-notes
